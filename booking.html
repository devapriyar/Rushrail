<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Book Ticket</title>

<link rel="stylesheet" href="./css/style.css">

</head>

<body class="booking-bg">

<div class="overlay">

<div class="form-card">

<h2>Passenger Details</h2>

<input type="text" placeholder="Passenger Name">

<input type="number" placeholder="Age">

<input type="number" placeholder="Number of Tickets">

<input type="number" placeholder="Adults">

<input type="number" placeholder="Children">

<input type="date">

<select>

<option>Select Compartment</option>
<option>General</option>
<option>Ladies</option>
<option>Sleeper</option>
<option>AC</option>

</select>

<input type="text" placeholder="Seat Number">

<button onclick="goToPayment()">Confirm Ticket</button>

<button onclick="goToDashboard()">Back</button>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
